# OpenAI Configuration
openai:
  embedding_model: "text-embedding-ada-002"
  model: "gpt-4o"
  api_key: "***"
  base_url: "***"

# Example config.yaml structure
ollama:
  base_url: http://localhost:11434  # Default Ollama URL
  embedding_model: None # Or another suitable embedding model
  chat_model: rjmalagon/gte-qwen2-7b-instruct:f16
  embedding_dim: 768 # Dimension for nomic-embed-text, adjust if using another model
# ... other configs like model_params, hirag ...
model_params:
  max_token_size: 8192 # Example, adjust as needed

# GLM Configuration
glm:
  model: "glm-4-plus"
  api_key: "***"
  base_url: "https://open.bigmodel.cn/api/paas/v4"
  embedding_model: "embedding-3"

# Deepseek Configuration
deepseek:
  model: "deepseek-chat"
  api_key: "***"
  base_url: "https://api.deepseek.com"

cohere:
  api_key: "***"
  model: "command-r"
  embedding_model: "embed-english-v3.0"
  embedding_dim: 1024

# Model Parameters
model_params:
  openai_embedding_dim: 1536
  glm_embedding_dim: 2048
  cohere_embedding_dim: 1024
  max_token_size: 8192

# HiRAG Configuration
hirag:
  working_dir: "./hirag_index_cohere
  enable_llm_cache: true
  enable_hierachical_mode: true
  embedding_batch_num: 6
  embedding_func_max_async: 8
  enable_naive_rag: true
  neo4j_url: "neo4j://localhost:****"
  neo4j_auth: ["neo4j", "****"]
